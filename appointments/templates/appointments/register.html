{% extends 'base.html' %}

{% block title %}Register - MedApp{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-xl-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">Create Account</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-person me-2"></i>Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-envelope me-2"></i>Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter email (optional)">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-telephone me-2"></i>Phone</label>
                        <input type="tel" name="phone" class="form-control" placeholder="Enter phone" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-lock me-2"></i>Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                        <i class="bi bi-check-lg me-2"></i>Register
                    </button>
                </form>
                <div class="text-center mt-4">
                    <p>Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
